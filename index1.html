<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 パターンメーカー</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Helvetica Neue',Arial,sans-serif; background:#f0faf7; height:100vh; display:flex; overflow:hidden; }

/* PANEL */
#panel { width:284px; min-width:240px; background:#fff; border-right:1px solid #d4ede7; display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }

/* Header */
.panel-header { padding:12px 15px 9px; border-bottom:1px solid #d4ede7; background:linear-gradient(135deg,#e4f9f2,#f5fdfb); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.panel-header h1 { font-size:13px; font-weight:700; color:#2e9e82; }
.panel-header p  { font-size:10px; color:#5a8a7a; margin-top:1px; }
#undoBtn { display:flex; align-items:center; gap:4px; padding:6px 10px; border-radius:8px; border:1.5px solid #d4ede7; background:#f5f5f5; color:#bbb; cursor:not-allowed; font-size:12px; font-weight:700; transition:all .15s; flex-shrink:0; }
#undoBtn.active { border-color:#5ecfb0; background:#edfaf5; color:#2e9e82; cursor:pointer; }

/* Tabs */
.tabs { display:flex; border-bottom:1px solid #d4ede7; background:#fafffe; flex-shrink:0; }
.tab { flex:1; padding:7px 4px; border:none; border-bottom:2px solid transparent; background:transparent; cursor:pointer; font-size:11px; font-weight:400; color:#888; transition:all .15s; }
.tab.active { border-bottom-color:#5ecfb0; font-weight:700; color:#2e9e82; }

/* Scroll area */
.panel-scroll { flex:1; overflow-y:auto; }

/* Section title */
.st { font-size:10px; font-weight:700; color:#5a8a7a; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }

.section { padding:12px 15px; border-bottom:1px solid #f0f8f5; }

/* Image slots */
.img-slots { display:flex; gap:8px; }
.img-slot { flex:1; aspect-ratio:1; border:2px dashed #d4ede7; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; background:#fafffe; font-size:10px; color:#5a8a7a; gap:4px; transition:border-color .2s; }
.img-slot.has-img { border-style:solid; border-color:#5ecfb0; background:#f0fdfb; }
.img-slot img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; }
.img-slot .slot-lbl { position:relative; z-index:1; background:rgba(255,255,255,.88); padding:1px 5px; border-radius:4px; font-size:9px; font-weight:600; color:#2e9e82; display:none; }
.img-slot.has-img .slot-lbl { display:block; }
.img-slot .plus { font-size:20px; color:#c8e0da; }
.img-slot .rm-btn { position:absolute; top:3px; right:3px; width:18px; height:18px; border-radius:50%; background:rgba(220,50,50,.85); border:none; color:white; font-size:10px; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:2; }
.img-slot.has-img .rm-btn { display:flex; }

/* Slider row */
.slider-row { display:flex; align-items:center; gap:6px; margin-bottom:7px; }
.slider-row label { font-size:11px; color:#5a8a7a; min-width:72px; flex-shrink:0; }
.slider-row input[type=range] { flex:1; cursor:pointer; }
.slider-row .val { font-size:11px; font-weight:700; min-width:40px; text-align:right; }

/* Section label */
.sub-label { font-size:10px; font-weight:600; color:#b0d0c8; margin-bottom:4px; margin-top:6px; }

/* Toggle switch */
.toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding:8px 10px; background:#f0fdfb; border-radius:8px; border:1px solid #d4ede7; }
.toggle-row span { font-size:12px; font-weight:600; color:#2e9e82; }
.switch { width:40px; height:22px; border-radius:11px; background:#d4ede7; cursor:pointer; position:relative; transition:background .2s; flex-shrink:0; }
.switch.on { background:#5ecfb0; }
.switch::after { content:''; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:white; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
.switch.on::after { left:21px; }

/* Mode selector */
.mode-btns { display:flex; gap:6px; margin-bottom:10px; }
.mode-btn { flex:1; padding:7px 4px; border:2px solid #d4ede7; border-radius:8px; background:#fafffe; cursor:pointer; font-size:11px; color:#888; line-height:1.3; transition:all .15s; }
.mode-btn.active { border-color:#5ecfb0; background:#edfaf5; color:#2e9e82; font-weight:700; }

/* Style toggles */
.style-btns { display:flex; gap:6px; margin-bottom:10px; }
.style-btn { flex:1; padding:5px; border:2px solid #d4ede7; border-radius:7px; background:#fafffe; cursor:pointer; font-size:11px; color:#888; transition:all .15s; }
.style-btn.active { border-color:#5ecfb0; background:#edfaf5; color:#2e9e82; font-weight:700; }

/* Align btns */
.align-btns { display:flex; gap:6px; margin-bottom:8px; }
.align-btn { flex:1; padding:5px; border:2px solid #d4ede7; border-radius:7px; background:#fafffe; cursor:pointer; font-size:10px; color:#888; transition:all .15s; }
.align-btn.active { border-color:#5ecfb0; background:#edfaf5; color:#2e9e82; }

/* Orient btns */
.orient-btns { display:flex; gap:8px; }
.orient-btn { flex:1; padding:10px 4px; border:2px solid #d4ede7; border-radius:8px; background:#fafffe; cursor:pointer; font-size:11px; color:#5a8a7a; display:flex; flex-direction:column; align-items:center; gap:3px; transition:all .15s; }
.orient-btn.active { border-color:#5ecfb0; background:#edfaf5; color:#2e9e82; font-weight:700; }
.orient-btn span { font-size:18px; }

/* Color row */
.color-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.color-swatch { width:26px; height:26px; border-radius:6px; border:2px solid #d4ede7; overflow:hidden; position:relative; flex-shrink:0; }
.color-swatch .swatch-bg { position:absolute; inset:0; pointer-events:none; }
.color-swatch input[type=color] { position:absolute; inset:-4px; width:calc(100% + 8px); height:calc(100% + 8px); opacity:0; cursor:pointer; border:none; }

/* Preset colors */
.presets { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
.preset { width:24px; height:24px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:transform .15s; }
.preset.active { outline:2px solid #5ecfb0; outline-offset:1px; border-color:#1a6a50; transform:scale(1.15); }

/* Text input */
.text-input { width:100%; padding:7px 10px; border:1px solid #d4ede7; border-radius:8px; font-size:13px; outline:none; }
select { width:100%; padding:6px 8px; border:1px solid #d4ede7; border-radius:8px; font-size:12px; background:white; margin-bottom:9px; }

/* Download area */
.dl-area { padding:12px 15px; border-top:1px solid #d4ede7; display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
.btn-dl { width:100%; padding:11px; border:none; border-radius:10px; cursor:pointer; font-size:13px; font-weight:700; color:white; transition:background .3s; }
.btn-green { background:linear-gradient(135deg,#5ecfb0,#2e9e82); }
.btn-purple { background:linear-gradient(135deg,#7c3aed,#a855f7); }
.btn-gray { background:#aaa; cursor:not-allowed; }
.dl-note { font-size:10px; color:#aaccc4; text-align:center; line-height:1.5; }

/* PREVIEW */
#preview-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#cde0da; padding:20px; gap:12px; overflow:auto; }
#preview-area canvas { display:block; box-shadow:0 16px 56px rgba(0,0,0,.28); border-radius:2px; }
#preview-label { font-size:10px; color:#5a8a8a; letter-spacing:.05em; display:flex; gap:12px; align-items:center; }
#history-count { color:#2e9e82; font-weight:600; display:none; }

/* FULLSCREEN */
#fullscreen { position:fixed; inset:0; z-index:9999; background:#111; display:none; flex-direction:column; align-items:center; justify-content:center; }
#fullscreen.show { display:flex; }
#fs-hint { position:absolute; top:14px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.7); color:white; font-size:12px; padding:6px 16px; border-radius:20px; white-space:nowrap; pointer-events:none; }
#fs-img { max-width:100vw; max-height:100vh; object-fit:contain; }

.hidden { display:none !important; }
input[type=file] { display:none; }
.tab-content { display:none; }
.tab-content.active { display:block; }
</style>
</head>
<body>

<!-- FULLSCREEN OVERLAY -->
<div id="fullscreen">
  <div id="fs-hint">📸 スクリーンショットで保存 ／ タップで閉じる</div>
  <img id="fs-img" src="" alt="pattern">
</div>

<!-- LEFT PANEL -->
<div id="panel">
  <div class="panel-header">
    <div>
      <h1>🎨 パターンメーカー</h1>
      <p>PNG 2枚＋テキストパターン対応</p>
    </div>
    <button id="undoBtn" onclick="undo()"><span>↩︎</span> 戻す</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('image',this)">🖼️ 画像</button>
    <button class="tab" onclick="switchTab('text',this)">✏️ テキスト</button>
    <button class="tab" onclick="switchTab('layout',this)">📄 レイアウト</button>
  </div>

  <div class="panel-scroll">

    <!-- IMAGE TAB -->
    <div id="tab-image" class="tab-content active">
      <div class="section">
        <div class="st">📂 画像（最大2枚）</div>
        <div class="img-slots">
          <div class="img-slot" id="slot0" onclick="slotClick(0)">
            <span class="plus">＋</span><span>画像1</span>
            <span class="slot-lbl">画像1</span>
            <button class="rm-btn" onclick="removeImg(event,0)">×</button>
          </div>
          <div class="img-slot" id="slot1" onclick="slotClick(1)">
            <span class="plus">＋</span><span>画像2</span>
            <span class="slot-lbl">画像2</span>
            <button class="rm-btn" onclick="removeImg(event,1)">×</button>
          </div>
        </div>
        <input type="file" id="file0" accept="image/*" onchange="loadFile(0,this)">
        <input type="file" id="file1" accept="image/*" onchange="loadFile(1,this)">
      </div>

      <div id="layer-controls"></div>
    </div>

    <!-- TEXT TAB -->
    <div id="tab-text" class="tab-content">
      <div class="section">
        <div class="st">✏️ テキスト</div>
        <div class="toggle-row">
          <span>テキストを表示</span>
          <div class="switch" id="textSwitch" onclick="toggleText()"></div>
        </div>
        <div id="text-settings" style="opacity:.4;pointer-events:none;">
          <div class="mode-btns">
            <button class="mode-btn active" id="modeOverlay" onclick="setTextMode('overlay')">📌 1か所に配置</button>
            <button class="mode-btn" id="modePattern" onclick="setTextMode('pattern')">🔁 パターン化</button>
          </div>

          <div style="margin-bottom:9px;">
            <div class="sub-label" style="margin-top:0;">テキスト内容</div>
            <input class="text-input" id="textContent" value="テキスト"
              oninput="textFieldChange('text', this.value)">
          </div>

          <div class="sub-label" style="margin-top:0;">フォント</div>
          <select id="fontSel" onchange="push();textFieldChange('font', this.value)">
            <option>sans-serif</option><option>serif</option><option>monospace</option>
            <option>Georgia</option><option>Palatino</option><option>Arial Black</option>
            <option>Impact</option><option>Trebuchet MS</option><option>Courier New</option>
          </select>

          <div class="color-row">
            <span style="font-size:11px;color:#5a8a7a;min-width:60px;">文字の色</span>
            <div class="color-swatch">
              <div class="swatch-bg" id="textColorSwatch" style="background:#ffffff;"></div>
              <input type="color" id="textColor" value="#ffffff"
                oninput="push();textFieldChange('color',this.value);document.getElementById('textColorSwatch').style.background=this.value;document.getElementById('textColorVal').textContent=this.value;">
            </div>
            <span id="textColorVal" style="font-size:11px;font-weight:700;color:#7c3aed;">#ffffff</span>
          </div>

          <div class="style-btns">
            <button class="style-btn active" id="btnBold"   onclick="textToggle('bold')">太字</button>
            <button class="style-btn"        id="btnItalic" onclick="textToggle('italic')">斜体</button>
            <button class="style-btn active" id="btnShadow" onclick="textToggle('shadow')">影</button>
          </div>

          <!-- OVERLAY settings -->
          <div id="overlay-settings">
            <div class="sub-label">文字サイズ・位置</div>
            <div class="slider-row">
              <label>文字サイズ</label>
              <input type="range" min="12" max="200" value="60" style="accent-color:#7c3aed"
                oninput="onSliderChange(event,'text',null,'size')">
              <span class="val" style="color:#7c3aed;">60px</span>
            </div>
            <div class="align-btns">
              <button class="align-btn active" data-align="left"   onclick="setAlign('left')">◀ 左</button>
              <button class="align-btn"        data-align="center" onclick="setAlign('center')">◼ 中央</button>
              <button class="align-btn"        data-align="right"  onclick="setAlign('right')">▶ 右</button>
            </div>
            <div class="slider-row">
              <label>横位置</label>
              <input type="range" min="0" max="100" value="50" style="accent-color:#7c3aed"
                oninput="onSliderChange(event,'text',null,'x')">
              <span class="val" style="color:#7c3aed;">50%</span>
            </div>
            <div class="slider-row">
              <label>縦位置</label>
              <input type="range" min="0" max="100" value="50" style="accent-color:#7c3aed"
                oninput="onSliderChange(event,'text',null,'y')">
              <span class="val" style="color:#7c3aed;">50%</span>
            </div>
            <div class="slider-row">
              <label>不透明度</label>
              <input type="range" min="10" max="100" value="90" style="accent-color:#7c3aed"
                oninput="onSliderChange(event,'text',null,'overlayOpacity')">
              <span class="val" style="color:#7c3aed;">90%</span>
            </div>
          </div>

          <!-- PATTERN settings -->
          <div id="pattern-settings" class="hidden">
            <div class="sub-label">パターン設定</div>
            <div class="slider-row">
              <label>文字サイズ</label>
              <input type="range" min="10" max="200" value="40" style="accent-color:#f472b6"
                oninput="onSliderChange(event,'text',null,'patternSize')">
              <span class="val" style="color:#f472b6;">40px</span>
            </div>
            <div class="slider-row">
              <label>間隔 X</label>
              <input type="range" min="-50" max="400" value="30" style="accent-color:#f472b6"
                oninput="onSliderChange(event,'text',null,'patternGapX')">
              <span class="val" style="color:#f472b6;">30px</span>
            </div>
            <div class="slider-row">
              <label>間隔 Y</label>
              <input type="range" min="-20" max="300" value="30" style="accent-color:#f472b6"
                oninput="onSliderChange(event,'text',null,'patternGapY')">
              <span class="val" style="color:#f472b6;">30px</span>
            </div>
            <div class="slider-row">
              <label>オフセット角</label>
              <input type="range" min="0" max="360" value="45" style="accent-color:#f472b6"
                oninput="onSliderChange(event,'text',null,'patternAngle')">
              <span class="val" style="color:#f472b6;">45°</span>
            </div>
            <div class="slider-row">
              <label>文字の回転</label>
              <input type="range" min="-180" max="180" value="0" style="accent-color:#f472b6"
                oninput="onSliderChange(event,'text',null,'patternRotate')">
              <span class="val" style="color:#f472b6;">0°</span>
            </div>
            <div class="slider-row">
              <label>移動 X</label>
              <input type="range" min="-300" max="300" value="0" style="accent-color:#f472b6"
                oninput="onSliderChange(event,'text',null,'patternOffsetX')">
              <span class="val" style="color:#f472b6;">0px</span>
            </div>
            <div class="slider-row">
              <label>移動 Y</label>
              <input type="range" min="-300" max="300" value="0" style="accent-color:#f472b6"
                oninput="onSliderChange(event,'text',null,'patternOffsetY')">
              <span class="val" style="color:#f472b6;">0px</span>
            </div>
            <div class="slider-row">
              <label>不透明度</label>
              <input type="range" min="10" max="100" value="90" style="accent-color:#f472b6"
                oninput="onSliderChange(event,'text',null,'patternOpacity')">
              <span class="val" style="color:#f472b6;">90%</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- LAYOUT TAB -->
    <div id="tab-layout" class="tab-content">
      <div class="section">
        <div class="st">🎨 背景色</div>
        <div class="color-row">
          <div class="color-swatch" style="width:30px;height:30px;border-radius:8px;">
            <div class="swatch-bg" id="bgSwatch" style="background:#5ecfb0;"></div>
            <input type="color" id="bgColor" value="#5ecfb0" oninput="setBg(this.value)">
          </div>
          <span id="bgColorVal" style="font-size:11px;font-weight:600;color:#2e9e82;">#5ecfb0</span>
          <span style="font-size:10px;color:#aaccc4;">← タップで変更</span>
        </div>
        <div class="presets" id="presets"></div>
        <div class="st">📄 向き</div>
        <div class="orient-btns">
          <button class="orient-btn active" id="btnPortrait" onclick="setOrientation('portrait',this)"><span>🗒️</span>縦 A4</button>
          <button class="orient-btn" id="btnLandscape" onclick="setOrientation('landscape',this)"><span>🖼️</span>横 A4</button>
        </div>
      </div>
    </div>

  </div><!-- end scroll -->

  <div class="dl-area">
    <button class="btn-dl btn-green" id="dlBtn" onclick="download()">⬇️ PNG ダウンロード</button>
    <button class="btn-dl btn-purple" onclick="openFullscreen()">📱 フルスクリーン表示</button>
    <div class="dl-note">スマホ → フルスクリーン → スクリーンショット</div>
  </div>
</div>

<!-- PREVIEW -->
<div id="preview-area">
  <canvas id="canvas"></canvas>
  <div id="preview-label">
    <span id="orientLabel">A4 縦 (210×297mm)</span>
    <span id="history-count"></span>
  </div>
</div>

  state.textCfg = { ...s.textCfg };
  state.layers = s.layers.map((l, i) => ({
    ...l,
    img: state.layers[i]?.src === l.src ? state.layers[i].img : null
  }));
  updateUndoBtn();
  syncAllUI();
  draw();
}
function updateUndoBtn() {
  const btn = document.getElementById('undoBtn');
  btn.classList.toggle('active', history.length > 0);
  btn.disabled = history.length === 0;
  const hc = document.getElementById('history-count');
  hc.style.display = history.length ? 'inline' : 'none';
  hc.textContent = '履歴 ' + history.length + '件';
}

// ── Draw ───────────────────────────────────────────────────
const canvas = document.getElementById('canvas');

function drawToCtx(c, cw, ch, scale) {
  const cx = c.getContext('2d');
  cx.fillStyle = state.bgColor;
  cx.fillRect(0, 0, cw, ch);

  state.layers.forEach(layer => {
    if (!layer.img) return;
    const size  = layer.size    * scale;
    const sgapX = layer.gapX   * scale;
    const sgapY = layer.gapY   * scale;
    const soffX = layer.offsetX * scale;
    const soffY = layer.offsetY * scale;
    const nat = layer.img.naturalWidth / layer.img.naturalHeight;
    let dw = size, dh = size;
    if (nat >= 1) dh = size / nat; else dw = size * nat;
    const padX = (size - dw) / 2, padY = (size - dh) / 2;
    const stepX = size + sgapX, stepY = size + sgapY;
    const shiftX = Math.cos(layer.angle * Math.PI / 180) * stepX;
    const cols = Math.ceil(cw / stepX) + 4;
    const rows = Math.ceil(ch / stepY) + 4;
    cx.globalAlpha = layer.opacity / 100;
    for (let r = -2; r < rows; r++) {
      for (let co = -2; co < cols; co++) {
        const odd = (((r % 2) + 2) % 2) !== 0;
        cx.drawImage(layer.img,
          co * stepX + (odd ? shiftX * 0.5 : 0) + soffX + padX,
          r * stepY + soffY + padY, dw, dh);
      }
    }
    cx.globalAlpha = 1;
  });

  const t = state.textCfg;
  if (!t.enabled || !t.text.trim()) return;

  if (t.mode === 'overlay') {
    const fs = t.size * scale;
    cx.font = `${t.italic ? 'italic ' : ''}${t.bold ? 'bold ' : ''}${fs}px ${t.font}`;
    cx.textAlign = t.align;
    cx.textBaseline = 'middle';
    if (t.shadow) {
      cx.shadowColor = 'rgba(0,0,0,0.5)';
      cx.shadowBlur = fs * 0.15;
      cx.shadowOffsetX = cx.shadowOffsetY = fs * 0.04;
    }
    cx.globalAlpha = t.overlayOpacity / 100;
    cx.fillStyle = t.color;
    cx.fillText(t.text, cw * t.x / 100, ch * t.y / 100);
    cx.shadowColor = 'transparent'; cx.shadowBlur = 0; cx.globalAlpha = 1;
  } else {
    const fs = t.patternSize * scale;
    const sgapX = t.patternGapX * scale;
    const sgapY = t.patternGapY * scale;
    const soffX = t.patternOffsetX * scale;
    const soffY = t.patternOffsetY * scale;
    cx.font = `${t.italic ? 'italic ' : ''}${t.bold ? 'bold ' : ''}${fs}px ${t.font}`;
    cx.textBaseline = 'middle';
    const tw = cx.measureText(t.text).width;
    const th = fs;
    const stepX = tw + sgapX, stepY = th + sgapY;
    const shiftX = Math.cos(t.patternAngle * Math.PI / 180) * stepX;
    const cols = Math.ceil(cw / stepX) + 6;
    const rows = Math.ceil(ch / stepY) + 6;
    const rotRad = t.patternRotate * Math.PI / 180;
    cx.globalAlpha = t.patternOpacity / 100;
    if (t.shadow) {
      cx.shadowColor = 'rgba(0,0,0,0.4)';
      cx.shadowBlur = fs * 0.12;
      cx.shadowOffsetX = cx.shadowOffsetY = fs * 0.03;
    }
    cx.fillStyle = t.color;
    for (let r = -3; r < rows; r++) {
      for (let co = -3; co < cols; co++) {
        const odd = (((r % 2) + 2) % 2) !== 0;
        const tx = co * stepX + (odd ? shiftX * 0.5 : 0) + soffX;
        const ty = r * stepY + soffY;
        if (rotRad !== 0) {
          cx.save();
          cx.translate(tx + tw / 2, ty + th / 2);
          cx.rotate(rotRad);
          cx.textAlign = 'center';
          cx.fillText(t.text, 0, 0);
          cx.restore();
        } else {
          cx.textAlign = 'left';
          cx.fillText(t.text, tx, ty + th / 2);
        }
      }
    }
    cx.shadowColor = 'transparent'; cx.shadowBlur = 0; cx.globalAlpha = 1;
  }
}

function draw() {
  const a4 = A4[state.orientation];
  canvas.width = a4.w; canvas.height = a4.h;
  drawToCtx(canvas, a4.w, a4.h, 1);
  fitCanvas();
}

function fitCanvas() {
  const area = document.getElementById('preview-area');
  const maxW = area.clientWidth - 40, maxH = area.clientHeight - 60;
  const a4 = A4[state.orientation];
  const s = Math.min(maxW / a4.w, maxH / a4.h, 1);
  canvas.style.width  = Math.round(a4.w * s) + 'px';
  canvas.style.height = Math.round(a4.h * s) + 'px';
}

function renderHiRes() {
  const scale = 2, a4 = A4[state.orientation];
  const off = document.createElement('canvas');
  off.width = a4.w * scale; off.height = a4.h * scale;
  drawToCtx(off, off.width, off.height, scale);
  return off.toDataURL('image/png');
}

// ── Image upload ───────────────────────────────────────────
function slotClick(idx) {
  if (!state.layers[idx].src) document.getElementById('file' + idx).click();
}
function loadFile(idx, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      push();
      state.layers[idx] = { ...state.layers[idx], src: ev.target.result, img, name: file.name };
      updateSlotUI(idx);
      rebuildLayerControls();
      draw();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';
}
function removeImg(e, idx) {
  e.stopPropagation(); push();
  state.layers[idx] = { src:null, img:null, name:"", size:120, gapX:20, gapY:20, offsetX:0, offsetY:0, angle:45, opacity:90 };
  updateSlotUI(idx);
  rebuildLayerControls();
  draw();
}
function updateSlotUI(idx) {
  const slot = document.getElementById('slot' + idx);
  const lay = state.layers[idx];
  if (lay.src) {
    slot.classList.add('has-img');
    let img = slot.querySelector('img');
    if (!img) { img = document.createElement('img'); slot.prepend(img); }
    img.src = lay.src;
  } else {
    slot.classList.remove('has-img');
    const img = slot.querySelector('img');
    if (img) img.remove();
  }
}

// ── Layer controls ─────────────────────────────────────────
const DOT_COLORS = ['#5ecfb0', '#fb923c'];
function mkSlider(label, min, max, val, unit, color, key, idx) {
  const onchange = idx !== undefined
    ? `onSliderChange(event,'layer',${idx},'${key}')`
    : `onSliderChange(event,'text',null,'${key}')`;
  return `<div class="slider-row">
    <label>${label}</label>
    <input type="range" min="${min}" max="${max}" value="${val}"
      style="accent-color:${color}"
      oninput="${onchange}">
    <span class="val" style="color:${color};">${val}${unit}</span>
  </div>`;
}

// Unified slider handler — pushes history only on first move of a drag
let _dragging = false;
function onSliderChange(e, type, layerIdx, key) {
  if (!_dragging) { push(); _dragging = true; }
  const val = Number(e.target.value);
  e.target.nextElementSibling.textContent = val + getUnit(key);
  if (type === 'layer') state.layers[layerIdx][key] = val;
  else state.textCfg[key] = val;
  draw();
}
function getUnit(key) {
  if (key === 'angle' || key.includes('Angle') || key.includes('Rotate')) return '°';
  if (key === 'opacity' || key.includes('Opacity') || key === 'x' || key === 'y') return '%';
  return 'px';
}
document.addEventListener('mouseup',  () => { _dragging = false; });
document.addEventListener('touchend', () => { _dragging = false; });

function rebuildLayerControls() {
  const el = document.getElementById('layer-controls');
  let html = '';
  state.layers.forEach((lay, idx) => {
    if (!lay.src) return;
    const c = DOT_COLORS[idx];
    html += `<div class="section">
      <div style="font-size:11px;font-weight:700;color:#5a8a7a;margin-bottom:8px;display:flex;align-items:center;gap:5px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block;"></span>
        画像${idx+1} <span style="font-weight:400;font-size:10px;color:#bbb;">${lay.name}</span>
      </div>
      <div class="sub-label" style="margin-top:0;">サイズ・間隔</div>
      ${mkSlider('サイズ',20,400,lay.size,'px',c,'size',idx)}
      ${mkSlider('間隔 X',-50,300,lay.gapX,'px',c,'gapX',idx)}
      ${mkSlider('間隔 Y',-50,300,lay.gapY,'px',c,'gapY',idx)}
      <div class="sub-label">位置・角度</div>
      ${mkSlider('移動 X',-300,300,lay.offsetX,'px',c,'offsetX',idx)}
      ${mkSlider('移動 Y',-300,300,lay.offsetY,'px',c,'offsetY',idx)}
      ${mkSlider('角度',0,360,lay.angle,'°',c,'angle',idx)}
      <div class="sub-label">不透明度</div>
      ${mkSlider('不透明度',10,100,lay.opacity,'%',c,'opacity',idx)}
    </div>`;
  });
  if (!html) html = '<div style="padding:20px 15px;font-size:11px;color:#aaccc4;text-align:center;">画像をアップロード</div>';
  el.innerHTML = html;
}

// ── Text ───────────────────────────────────────────────────
function toggleText() {
  push();
  state.textCfg.enabled = !state.textCfg.enabled;
  syncTextUI();
  draw();
}

// Called by text input fields — no push needed per keystroke
function textFieldChange(key, val) {
  state.textCfg[key] = val;
  draw();
}

// Push + update for toggle-style buttons
function textToggle(key) {
  push();
  state.textCfg[key] = !state.textCfg[key];
  syncTextUI();
  draw();
}

function setTextMode(mode) {
  push();
  state.textCfg.mode = mode;
  syncTextUI();
  draw();
}

function setAlign(val) {
  push();
  state.textCfg.align = val;
  syncTextUI();
  draw();
}

function syncTextUI() {
  const t = state.textCfg;
  const sw = document.getElementById('textSwitch');
  const ts = document.getElementById('text-settings');
  sw.classList.toggle('on', t.enabled);
  ts.style.opacity = t.enabled ? '1' : '0.4';
  ts.style.pointerEvents = t.enabled ? 'auto' : 'none';

  document.getElementById('textContent').value = t.text;
  document.getElementById('fontSel').value = t.font;
  document.getElementById('textColor').value = t.color;
  document.getElementById('textColorSwatch').style.background = t.color;
  document.getElementById('textColorVal').textContent = t.color;

  document.getElementById('btnBold').classList.toggle('active', t.bold);
  document.getElementById('btnItalic').classList.toggle('active', t.italic);
  document.getElementById('btnShadow').classList.toggle('active', t.shadow);

  document.getElementById('modeOverlay').classList.toggle('active', t.mode === 'overlay');
  document.getElementById('modePattern').classList.toggle('active', t.mode === 'pattern');
  document.getElementById('overlay-settings').classList.toggle('hidden', t.mode !== 'overlay');
  document.getElementById('pattern-settings').classList.toggle('hidden', t.mode !== 'pattern');

  document.querySelectorAll('.align-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.align === t.align));
}

// ── Background & orientation ───────────────────────────────
function setBg(val) {
  push();
  state.bgColor = val;
  document.getElementById('bgColor').value = val;
  document.getElementById('bgSwatch').style.background = val;
  document.getElementById('bgColorVal').textContent = val;
  document.querySelectorAll('.preset').forEach(p =>
    p.classList.toggle('active', p.dataset.color === val));
  draw();
}

function setOrientation(val) {
  push();
  state.orientation = val;
  document.getElementById('btnPortrait').classList.toggle('active', val === 'portrait');
  document.getElementById('btnLandscape').classList.toggle('active', val === 'landscape');
  document.getElementById('orientLabel').textContent =
    val === 'portrait' ? 'A4 縦 (210×297mm)' : 'A4 横 (297×210mm)';
  draw();
}

// ── Tabs ───────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── Download / Fullscreen ──────────────────────────────────
function download() {
  const btn = document.getElementById('dlBtn');
  btn.textContent = '⏳ 生成中...'; btn.className = 'btn-dl btn-gray';
  setTimeout(() => {
    try {
      const url = renderHiRes();
      const a = document.createElement('a');
      a.href = url; a.download = 'pattern_A4.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      btn.textContent = '✅ 完了！'; btn.className = 'btn-dl btn-green';
      setTimeout(() => { btn.textContent = '⬇️ PNG ダウンロード'; btn.className = 'btn-dl btn-green'; }, 3000);
    } catch(e) {
      btn.textContent = '❌ エラー'; btn.className = 'btn-dl btn-gray';
      setTimeout(() => { btn.textContent = '⬇️ PNG ダウンロード'; btn.className = 'btn-dl btn-green'; }, 3000);
    }
  }, 50);
}

function openFullscreen() {
  const url = renderHiRes();
  document.getElementById('fs-img').src = url;
  document.getElementById('fullscreen').classList.add('show');
}
document.getElementById('fullscreen').addEventListener('click', () => {
  document.getElementById('fullscreen').classList.remove('show');
  document.getElementById('fs-img').src = '';
});

// ── Full UI sync (used after undo) ─────────────────────────
function syncAllUI() {
  // bg
  document.getElementById('bgColor').value = state.bgColor;
  document.getElementById('bgSwatch').style.background = state.bgColor;
  document.getElementById('bgColorVal').textContent = state.bgColor;
  document.querySelectorAll('.preset').forEach(p =>
    p.classList.toggle('active', p.dataset.color === state.bgColor));
  // orientation
  document.getElementById('btnPortrait').classList.toggle('active', state.orientation === 'portrait');
  document.getElementById('btnLandscape').classList.toggle('active', state.orientation === 'landscape');
  document.getElementById('orientLabel').textContent =
    state.orientation === 'portrait' ? 'A4 縦 (210×297mm)' : 'A4 横 (297×210mm)';
  // slots & layers
  [0, 1].forEach(i => updateSlotUI(i));
  rebuildLayerControls();
  // text
  syncTextUI();
}

// ── Presets ────────────────────────────────────────────────
function initPresets() {
  const el = document.getElementById('presets');
  PRESETS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'preset' + (c === state.bgColor ? ' active' : '');
    d.style.background = c; d.dataset.color = c;
    d.onclick = () => setBg(c);
    el.appendChild(d);
  });
}

// ── Load cat ───────────────────────────────────────────────
const catImg = new Image();
catImg.onload = () => {
  state.layers[0] = { ...state.layers[0], src: CAT_B64, img: catImg, name: 'cat_face.png' };
  updateSlotUI(0);
  rebuildLayerControls();
  draw();
};
catImg.src = CAT_B64;

// ── Bootstrap ──────────────────────────────────────────────
initPresets();
rebuildLayerControls();
updateUndoBtn();
window.addEventListener('resize', fitCanvas);

</script>
</body>
</html>
