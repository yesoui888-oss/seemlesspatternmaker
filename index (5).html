<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シームレスパターンメーカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 280px; background: #fff; padding: 16px; overflow-y: auto; border-right: 1px solid #ddd; flex-shrink: 0; }
    #canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #e8e8e8; }
    canvas { box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    h2 { font-size: 14px; color: #333; margin-bottom: 12px; font-weight: bold; }
    .section { margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 16px; }
    label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; margin-top: 8px; }
    input[type=range] { width: 100%; accent-color: #5ecfb0; }
    .val { font-size: 11px; color: #5ecfb0; font-weight: bold; float: right; }
    .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .preset { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .preset.active { border-color: #333; }
    button { width: 100%; padding: 10px; background: #5ecfb0; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; margin-top: 8px; }
    button:hover { background: #4db8a0; }
    .tabs { display: flex; margin-bottom: 12px; }
    .tab { flex: 1; padding: 6px; text-align: center; font-size: 11px; cursor: pointer; border-bottom: 2px solid #eee; color: #999; }
    .tab.active { border-color: #5ecfb0; color: #5ecfb0; font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #undo-btn { background: #aaa; margin-top: 4px; }
  </style>
</head>
<body>
<div id="sidebar">
  <h2>🐱 シームレスパターンメーカー</h2>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('image')">画像</div>
    <div class="tab" onclick="switchTab('layout')">レイアウト</div>
  </div>

  <div id="tab-image" class="tab-content active">
    <div class="section">
      <label>背景色</label>
      <div class="presets" id="color-presets"></div>
      <label>カスタム色 <input type="color" id="custom-color" style="margin-left:8px;vertical-align:middle;"></label>
    </div>
    <div class="section">
      <label>サイズ <span class="val" id="size-val">120px</span></label>
      <input type="range" id="size" min="40" max="300" value="120">
      <label>間隔X <span class="val" id="gapx-val">0px</span></label>
      <input type="range" id="gapx" min="-100" max="200" value="0">
      <label>間隔Y <span class="val" id="gapy-val">0px</span></label>
      <input type="range" id="gapy" min="-100" max="200" value="0">
      <label>ずらしX <span class="val" id="offx-val">0px</span></label>
      <input type="range" id="offx" min="-200" max="200" value="0">
      <label>ずらしY <span class="val" id="offy-val">0px</span></label>
      <input type="range" id="offy" min="-200" max="200" value="0">
      <label>角度 <span class="val" id="angle-val">0°</span></label>
      <input type="range" id="angle" min="-180" max="180" value="0">
      <label>不透明度 <span class="val" id="opacity-val">100%</span></label>
      <input type="range" id="opacity" min="10" max="100" value="100">
    </div>
  </div>

  <div id="tab-layout" class="tab-content">
    <div class="section">
      <label>向き</label>
      <select id="orientation" style="width:100%;padding:6px;margin-top:4px;border-radius:6px;border:1px solid #ddd;">
        <option value="portrait">A4 縦 (210×297mm)</option>
        <option value="landscape">A4 横 (297×210mm)</option>
      </select>
    </div>
  </div>

  <button onclick="saveHistory(); draw()">🔄 更新</button>
  <button id="undo-btn" onclick="undo()">↩︎ 戻す</button>
  <button onclick="downloadPNG()">⬇️ PNG ダウンロード</button>
  <button onclick="toggleFullscreen()">🖥 フルスクリーン</button>
</div>

<div id="canvas-area">
  <canvas id="canvas"></canvas>
</div>

const PRESETS = [
  "#5ecfb0","#4db8e8","#ff7eb3","#ffd93d","#c084fc",
  "#6ee7a0","#ff9f5a","#f472b6","#60a5fa","#fb923c",
  "#0ea5e9","#10b981","#a855f7","#ef4444","#f59e0b",
];

let catImg = new Image();
catImg.src = CAT_B64;
catImg.onload = () => draw();

let bgColor = "#5ecfb0";
let history = [];

// Build color presets
const presetsEl = document.getElementById('color-presets');
PRESETS.forEach(c => {
  const d = document.createElement('div');
  d.className = 'preset' + (c === bgColor ? ' active' : '');
  d.style.background = c;
  d.onclick = () => {
    bgColor = c;
    document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
    d.classList.add('active');
    draw();
  };
  presetsEl.appendChild(d);
});

document.getElementById('custom-color').addEventListener('input', e => {
  bgColor = e.target.value;
  document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
  draw();
});

// Sliders
function slider(id, valId, unit) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    document.getElementById(valId).textContent = el.value + unit;
    draw();
  });
}
slider('size','size-val','px');
slider('gapx','gapx-val','px');
slider('gapy','gapy-val','px');
slider('offx','offx-val','px');
slider('offy','offy-val','px');
slider('angle','angle-val','°');
slider('opacity','opacity-val','%');
document.getElementById('orientation').addEventListener('change', draw);

function getVals() {
  return {
    size: +document.getElementById('size').value,
    gapX: +document.getElementById('gapx').value,
    gapY: +document.getElementById('gapy').value,
    offX: +document.getElementById('offx').value,
    offY: +document.getElementById('offy').value,
    angle: +document.getElementById('angle').value,
    opacity: +document.getElementById('opacity').value / 100,
    orientation: document.getElementById('orientation').value,
  };
}

function getCanvasSize(orientation) {
  const scale = 2;
  return orientation === 'portrait'
    ? { w: 210 * scale, h: 297 * scale }
    : { w: 297 * scale, h: 210 * scale };
}

function draw() {
  const v = getVals();
  const { w, h } = getCanvasSize(v.orientation);
  const canvas = document.getElementById('canvas');
  const maxH = window.innerHeight - 40;
  const maxW = window.innerWidth - 300;
  const scale = Math.min(maxW / w, maxH / h, 1);
  canvas.style.width = (w * scale) + 'px';
  canvas.style.height = (h * scale) + 'px';
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, w, h);

  if (!catImg.complete) return;

  const stepX = v.size + v.gapX;
  const stepY = v.size + v.gapY;
  ctx.globalAlpha = v.opacity;

  for (let row = -2; row * stepY < h + v.size * 2; row++) {
    for (let col = -2; col * stepX < w + v.size * 2; col++) {
      const x = col * stepX + (row % 2 === 0 ? 0 : stepX / 2) + v.offX;
      const y = row * stepY + v.offY;
      ctx.save();
      ctx.translate(x + v.size / 2, y + v.size / 2);
      ctx.rotate(v.angle * Math.PI / 180);
      ctx.drawImage(catImg, -v.size / 2, -v.size / 2, v.size, v.size);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
}

function saveHistory() {
  const v = getVals();
  history.push({ ...v, bgColor });
  if (history.length > 30) history.shift();
}

function undo() {
  if (history.length === 0) return;
  const v = history.pop();
  bgColor = v.bgColor;
  document.getElementById('size').value = v.size;
  document.getElementById('size-val').textContent = v.size + 'px';
  document.getElementById('gapx').value = v.gapX;
  document.getElementById('gapx-val').textContent = v.gapX + 'px';
  document.getElementById('gapy').value = v.gapY;
  document.getElementById('gapy-val').textContent = v.gapY + 'px';
  document.getElementById('offx').value = v.offX;
  document.getElementById('offx-val').textContent = v.offX + 'px';
  document.getElementById('offy').value = v.offY;
  document.getElementById('offy-val').textContent = v.offY + 'px';
  document.getElementById('angle').value = v.angle;
  document.getElementById('angle-val').textContent = v.angle + '°';
  document.getElementById('opacity').value = v.opacity * 100;
  document.getElementById('opacity-val').textContent = (v.opacity * 100) + '%';
  document.getElementById('orientation').value = v.orientation;
  draw();
}

function downloadPNG() {
  const canvas = document.getElementById('canvas');
  const a = document.createElement('a');
  a.download = 'seamless-pattern.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function toggleFullscreen() {
  const el = document.getElementById('canvas-area');
  if (!document.fullscreenElement) {
    el.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['image','layout'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(t => {
    t.classList.toggle('active', t.id === 'tab-' + name);
  });
}

window.addEventListener('resize', draw);
draw();
</script>
